<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr.Oliver's Games</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #111; color: white; }
    button, input, select { font: inherit; }
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: block; }
    #homeScreen { padding: 24px; text-align: center; }
    #homeScreen h1 { font-size: 48px; margin: 10px 0; }
    #homeScreen p { color: #ccc; margin-bottom: 24px; }
    #gamesList {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      max-width: 1200px;
      margin: 0 auto 30px;
    }
    .game-card {
      background: #1d1d1d;
      color: white;
      border: 2px solid #333;
      padding: 18px;
      border-radius: 14px;
      cursor: pointer;
      text-align: left;
      min-height: 110px;
    }
    .game-card:hover { border-color: #6aa9ff; transform: translateY(-1px); }
    .game-card h3 { margin: 0 0 8px; font-size: 22px; }
    .tag { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #243142; color: #b7d9ff; font-size: 12px; }
    #gameScreen { padding: 16px; background: #111; }
    #topBar {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      flex-wrap: wrap; margin-bottom: 10px;
    }
    #backBtn {
      padding: 10px 14px; border: none; border-radius: 10px; background: white; color: black; font-weight: bold; cursor: pointer;
    }
    #gameTitle { margin: 0; font-size: 32px; }
    #gameInstructions { color: #ccc; margin: 0; }
    #statusBar {
      display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
      max-width: 1100px; margin: 0 auto 10px;
    }
    .status-pill {
      background: #1f1f1f; border: 1px solid #333; color: #e7e7e7;
      padding: 8px 12px; border-radius: 999px; font-size: 14px;
    }
    #canvasWrap {
      max-width: 1100px; margin: 0 auto;
      background: #0d0d0d; border: 2px solid #333; border-radius: 14px; padding: 12px;
    }
    #gameCanvas { width: 100%; max-width: 900px; background: #222; border: 2px solid #555; border-radius: 10px; display: block; margin: 0 auto; }
    #gameUI {
      max-width: 900px; margin: 12px auto 0; padding: 12px;
      background: #171717; border: 1px solid #333; border-radius: 12px;
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; align-items: center;
    }
    .ui-section {
      background: #222; border: 1px solid #3a3a3a; padding: 10px 12px; border-radius: 10px;
      display: inline-flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .ui-title { font-weight: bold; margin-right: 8px; }
    .ui-btn {
      padding: 9px 12px; border: none; border-radius: 8px; background: #2e65ff; color: white; cursor: pointer;
    }
    .ui-btn.secondary { background: #444; }
    .ui-btn.good { background: #25a55a; }
    .ui-btn.bad { background: #b64040; }
    .ui-btn.gold { background: #c78a14; }
    .ui-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .big-note { color: #bbb; font-size: 14px; text-align: center; }
    @media (max-width: 640px) {
      #homeScreen h1 { font-size: 36px; }
      #gameTitle { font-size: 26px; }
      #gameCanvas { height: auto; }
    }
  </style>
</head>
<body>
  <div id="homeScreen" class="screen active">
    <h1>Mr.Oliver's Games</h1>
    <p>30 playable mini-games in one file</p>
    <div id="gamesList"></div>
    <div class="big-note">Tip: on phones, some games work best in landscape.</div>
  </div>

  <div id="gameScreen" class="screen">
    <div id="topBar">
      <button id="backBtn">← Back to Mr.Oliver's Games</button>
      <div style="flex:1; min-width:220px;">
        <h2 id="gameTitle"></h2>
        <p id="gameInstructions"></p>
      </div>
    </div>
    <div id="statusBar"></div>
    <div id="canvasWrap">
      <canvas id="gameCanvas" width="900" height="560"></canvas>
      <div id="gameUI"></div>
    </div>
  </div>

<script>
(() => {
  const homeScreen = document.getElementById('homeScreen');
  const gameScreen = document.getElementById('gameScreen');
  const gamesList = document.getElementById('gamesList');
  const backBtn = document.getElementById('backBtn');
  const gameTitle = document.getElementById('gameTitle');
  const gameInstructions = document.getElementById('gameInstructions');
  const statusBar = document.getElementById('statusBar');
  const gameUI = document.getElementById('gameUI');
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  const keys = {};
  let mouse = { x: 0, y: 0, down: false };
  let currentGame = null;
  let currentGameId = null;
  let lastTime = 0;

  const helpers = {
    rand(min, max) { return Math.random() * (max - min) + min; },
    randi(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; },
    clamp(v, min, max) { return Math.max(min, Math.min(max, v)); },
    rects(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    },
    dist(x1, y1, x2, y2) { return Math.hypot(x1 - x2, y1 - y2); },
    circleRect(cx, cy, r, rect) {
      const testX = Math.max(rect.x, Math.min(cx, rect.x + rect.w));
      const testY = Math.max(rect.y, Math.min(cy, rect.y + rect.h));
      return ((cx - testX) ** 2 + (cy - testY) ** 2) <= r * r;
    },
    drawText(text, x, y, size = 24, color = 'white', align='left') {
      ctx.fillStyle = color;
      ctx.font = `${size}px Arial`;
      ctx.textAlign = align;
      ctx.fillText(text, x, y);
      ctx.textAlign = 'left';
    },
    button(label, onClick, opts = {}) {
      const b = document.createElement('button');
      b.className = 'ui-btn' + (opts.kind ? ' ' + opts.kind : '');
      b.textContent = label;
      b.onclick = onClick;
      if (opts.disabled) b.disabled = true;
      return b;
    },
    section(title) {
      const d = document.createElement('div');
      d.className = 'ui-section';
      if (title) {
        const s = document.createElement('span');
        s.className = 'ui-title';
        s.textContent = title;
        d.appendChild(s);
      }
      return d;
    },
    resetUI() {
      gameUI.innerHTML = '';
      statusBar.innerHTML = '';
    },
    status(text) {
      const el = document.createElement('div');
      el.className = 'status-pill';
      el.textContent = text;
      statusBar.appendChild(el);
      return el;
    },
    centerMessage(title, subtitle='') {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      helpers.drawText(title, canvas.width/2, canvas.height/2 - 10, 42, 'white', 'center');
      if (subtitle) helpers.drawText(subtitle, canvas.width/2, canvas.height/2 + 30, 24, '#ddd', 'center');
    },
    clear(bg='#222') {
      ctx.fillStyle = bg;
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }
  };

  function setGame(id, game) {
    if (currentGame && currentGame.cleanup) currentGame.cleanup();
    currentGame = game;
    currentGameId = id;
    helpers.resetUI();
    gameTitle.textContent = game.name;
    gameInstructions.textContent = game.instructions || '';
    currentGame.init?.();
    homeScreen.classList.remove('active');
    gameScreen.classList.add('active');
  }

  function goHome() {
    if (currentGame && currentGame.cleanup) currentGame.cleanup();
    currentGame = null;
    currentGameId = null;
    homeScreen.classList.add('active');
    gameScreen.classList.remove('active');
    helpers.resetUI();
  }

  backBtn.onclick = goHome;

  function canvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
  }

  window.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
    if (currentGame?.keydown) currentGame.keydown(e);
  });
  window.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
    if (currentGame?.keyup) currentGame.keyup(e);
  });
  canvas.addEventListener('mousemove', (e) => {
    mouse = { ...mouse, ...canvasPos(e) };
    currentGame?.mousemove?.(mouse.x, mouse.y, e);
  });
  canvas.addEventListener('mousedown', (e) => {
    mouse = { ...mouse, ...canvasPos(e), down: true };
    currentGame?.mousedown?.(mouse.x, mouse.y, e);
    currentGame?.click?.(mouse.x, mouse.y, e);
  });
  canvas.addEventListener('mouseup', (e) => {
    mouse = { ...mouse, ...canvasPos(e), down: false };
    currentGame?.mouseup?.(mouse.x, mouse.y, e);
  });

  function loop(ts) {
    const dt = Math.min(0.033, (ts - lastTime) / 1000 || 0.016);
    lastTime = ts;
    if (currentGame) {
      currentGame.update?.(dt);
      currentGame.draw?.();
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // -------- Games --------
  function createSnake() {
    const box = 20;
    let snake, dir, nextDir, food, score, over, forever, timer;
    const W = 30, H = 24;
    function newFood() {
      while (true) {
        const f = { x: helpers.randi(0, W-1), y: helpers.randi(0, H-1) };
        if (!snake.some(s => s.x === f.x && s.y === f.y)) return f;
      }
    }
    return {
      name: 'Snake',
      instructions: 'Arrow keys to move. R restarts. Forever mode wraps around edges.',
      init() {
        snake = [{x:10,y:10}];
        dir = 'right'; nextDir = 'right'; food = {x:15,y:8}; score = 0; over = false; forever = false; timer = 0;
        const sec = helpers.section('Mode');
        sec.appendChild(helpers.button('Normal', () => { forever = false; this.init(); }, {kind:'secondary'}));
        sec.appendChild(helpers.button('Forever', () => { forever = true; this.init(); forever = true; }));
        gameUI.appendChild(sec);
      },
      keydown(e) {
        const k = e.key.toLowerCase();
        if (k === 'arrowup' && dir !== 'down') nextDir = 'up';
        if (k === 'arrowdown' && dir !== 'up') nextDir = 'down';
        if (k === 'arrowleft' && dir !== 'right') nextDir = 'left';
        if (k === 'arrowright' && dir !== 'left') nextDir = 'right';
        if (k === 'r' && over) this.init();
      },
      update(dt) {
        timer += dt;
        if (timer < 0.16 || over) return;
        timer = 0;
        dir = nextDir;
        let head = {...snake[0]};
        if (dir === 'up') head.y--;
        if (dir === 'down') head.y++;
        if (dir === 'left') head.x--;
        if (dir === 'right') head.x++;
        if (forever) {
          if (head.x < 0) head.x = W-1;
          if (head.x >= W) head.x = 0;
          if (head.y < 0) head.y = H-1;
          if (head.y >= H) head.y = 0;
        }
        if (!forever && (head.x < 0 || head.y < 0 || head.x >= W || head.y >= H)) { over = true; return; }
        if (snake.some(s => s.x === head.x && s.y === head.y)) {
          if (forever) snake.pop(); else { over = true; return; }
        }
        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
          score++;
          food = newFood();
        } else snake.pop();
      },
      draw() {
        helpers.clear('#182018');
        for (let x=0;x<W;x++) for (let y=0;y<H;y++) {
          ctx.strokeStyle = '#274027';
          ctx.strokeRect(120+x*box, 40+y*box, box, box);
        }
        ctx.fillStyle = 'red';
        ctx.fillRect(120 + food.x*box, 40 + food.y*box, box, box);
        snake.forEach((s,i) => {
          ctx.fillStyle = i ? '#2fc14f' : '#7dff7d';
          ctx.fillRect(120 + s.x*box, 40 + s.y*box, box, box);
        });
        helpers.drawText(`Score: ${score}`, 20, 36, 24);
        helpers.drawText(`Mode: ${forever ? 'Forever' : 'Normal'}`, 20, 66, 22);
        if (over) helpers.centerMessage('Game Over', 'Press R to restart');
      }
    };
  }

  function createFlappy() {
    let bird, pipes, timer, score, over;
    return {
      name: 'Flappy Bird',
      instructions: 'Press space or click to flap through the pipes.',
      init() {
        bird = {x:170,y:220,vy:0,r:18};
        pipes = [];
        timer = 0; score = 0; over = false;
        gameUI.appendChild(helpers.section()).appendChild(helpers.button('Restart', ()=>this.init(), {kind:'secondary'}));
      },
      flap() { if (!over) bird.vy = -320; },
      keydown(e) { if (e.key === ' ') { e.preventDefault(); this.flap(); } if (e.key.toLowerCase()==='r' && over) this.init(); },
      click() { this.flap(); },
      update(dt) {
        if (over) return;
        timer += dt;
        bird.vy += 700*dt;
        bird.y += bird.vy*dt;
        if (timer > 1.5) {
          timer = 0;
          const gap = 150;
          const top = helpers.randi(80, 320);
          pipes.push({x:900,w:70,top, gap, passed:false});
        }
        pipes.forEach(p=>p.x -= 220*dt);
        pipes = pipes.filter(p=>p.x+p.w>-20);
        if (bird.y < 0 || bird.y > 560) over = true;
        for (const p of pipes) {
          if (!p.passed && p.x + p.w < bird.x) { p.passed = true; score++; }
          const topRect = {x:p.x,y:0,w:p.w,h:p.top-gap/2};
          const botRect = {x:p.x,y:p.top+gap/2,w:p.w,h:560-(p.top+gap/2)};
          if (helpers.circleRect(bird.x, bird.y, bird.r, topRect) || helpers.circleRect(bird.x,bird.y,bird.r,botRect)) over = true;
        }
      },
      draw() {
        helpers.clear('#73c8ff');
        ctx.fillStyle='#6bc24a'; ctx.fillRect(0,500,900,60);
        for (const p of pipes) {
          ctx.fillStyle = '#2faa2f';
          ctx.fillRect(p.x,0,p.w,p.top-p.gap/2);
          ctx.fillRect(p.x,p.top+p.gap/2,p.w,560-(p.top+p.gap/2));
        }
        ctx.fillStyle = '#ffd44d';
        ctx.beginPath(); ctx.arc(bird.x,bird.y,bird.r,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='black'; ctx.beginPath(); ctx.arc(bird.x+6,bird.y-4,3,0,Math.PI*2); ctx.fill();
        helpers.drawText(`Score: ${score}`, 20, 32, 28);
        if (over) helpers.centerMessage('Crashed!', 'Press R or Restart');
      }
    };
  }

  function createShooter() {
    let ship, bullets, enemies, stars, cooldown, spawn, score, lives, over;
    return {
      name:'Space Shooter',
      instructions:'Move with arrow keys or A/D. Space shoots. Destroy enemies and survive.',
      init() {
        ship = {x:430,y:500,w:40,h:28};
        bullets=[]; enemies=[]; stars=Array.from({length:70},()=>({x:helpers.rand(0,900),y:helpers.rand(0,560),s:helpers.rand(1,3)}));
        cooldown=0; spawn=0; score=0; lives=3; over=false;
        gameUI.appendChild(helpers.section()).appendChild(helpers.button('Restart', ()=>this.init(), {kind:'secondary'}));
      },
      keydown(e){ if(e.key===' '&&!over) this.fire(); if(e.key.toLowerCase()==='r'&&over)this.init(); },
      fire(){ if(cooldown<=0){ bullets.push({x:ship.x+ship.w/2-3,y:ship.y,w:6,h:14}); cooldown=0.25; } },
      update(dt){
        stars.forEach(s=>{s.y+=30*s.s*dt;if(s.y>560){s.y=0;s.x=helpers.rand(0,900);}});
        if(over) return;
        if(keys['arrowleft']||keys['a']) ship.x-=340*dt;
        if(keys['arrowright']||keys['d']) ship.x+=340*dt;
        ship.x=helpers.clamp(ship.x,0,900-ship.w);
        cooldown-=dt;
        spawn+=dt;
        if(spawn>0.7){spawn=0; enemies.push({x:helpers.rand(20,840),y:-30,w:32,h:26,hp:1,vy:helpers.rand(110,190)});}
        bullets.forEach(b=>b.y-=500*dt);
        enemies.forEach(en=>en.y+=en.vy*dt);
        bullets=bullets.filter(b=>b.y>-30);
        enemies=enemies.filter(en=>en.y<620&&en.hp>0);
        for(const b of bullets){
          for(const en of enemies){
            if(helpers.rects(b,en)&&en.hp>0){en.hp--;b.y=-100;score+=10;}
          }
        }
        for(const en of enemies){
          if(helpers.rects(ship,en)&&en.hp>0){en.hp=0;lives--; if(lives<=0) over=true;}
          if(en.y>560 && en.hp>0){en.hp=0;lives--; if(lives<=0) over=true;}
        }
      },
      draw(){
        helpers.clear('black');
        ctx.fillStyle='white'; stars.forEach(s=>ctx.fillRect(s.x,s.y,s.s,s.s));
        ctx.fillStyle='#2e8cff'; ctx.fillRect(ship.x,ship.y,ship.w,ship.h);
        ctx.fillStyle='#88c4ff'; ctx.fillRect(ship.x+12,ship.y-10,16,10);
        ctx.fillStyle='yellow'; bullets.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));
        ctx.fillStyle='crimson'; enemies.forEach(en=>ctx.fillRect(en.x,en.y,en.w,en.h));
        helpers.drawText(`Score: ${score}`,20,32,28);
        helpers.drawText(`Lives: ${lives}`,20,62,24);
        if(over) helpers.centerMessage('Game Over','Press R or Restart');
      }
    };
  }

  function createCookie() {
    let cookies, perClick, upgradeBought;
    return {
      name:'Cookie Clicker',
      instructions:'Click the cookie. Buy the upgrade at 10 cookies.',
      init(){
        cookies=0; perClick=1; upgradeBought=false;
        const sec=helpers.section('Shop');
        const buyBtn=helpers.button('Double Click Power (10)',()=>{
          if(cookies>=10&&!upgradeBought){cookies-=10;perClick=2;upgradeBought=true;buyBtn.disabled=true;buyBtn.textContent='Upgrade Purchased!';}
        },{kind:'good',disabled:true});
        this._buyBtn=buyBtn;
        sec.appendChild(buyBtn);
        gameUI.appendChild(sec);
      },
      click(x,y){
        const cx=450, cy=260, r=95;
        if(helpers.dist(x,y,cx,cy)<=r){
          cookies += perClick;
          if(cookies>=10 && !upgradeBought) this._buyBtn.disabled=false;
        }
      },
      draw(){
        helpers.clear('#fff3cd');
        helpers.drawText(`Cookies: ${cookies}`, 40, 50, 30, 'black');
        ctx.fillStyle='#d2691e';
        ctx.beginPath(); ctx.arc(450,260,95,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#8b4513';
        [[-35,-30],[30,-25],[-15,10],[35,18],[-40,35]].forEach(([dx,dy])=>{
          ctx.beginPath(); ctx.arc(450+dx,260+dy,10,0,Math.PI*2); ctx.fill();
        });
        helpers.drawText(`Click Power: ${perClick}`, 40, 88, 24, 'black');
      }
    };
  }

  function createDoger() {
    let level, score, coins, currentSkin, ownedSkins, obstacles, gameOver, levelComplete, frameCount, mouseActive;
    const levelGoal = 100;
    const skinList = [
      { name: "white", color: "white", cost: 0, text: "black" },
      { name: "red", color: "red", cost: 100, text: "white" },
      { name: "orange", color: "orange", cost: 200, text: "black" },
      { name: "yellow", color: "yellow", cost: 300, text: "black" },
      { name: "green", color: "green", cost: 400, text: "white" },
      { name: "blue", color: "blue", cost: 500, text: "white" },
      { name: "purple", color: "purple", cost: 600, text: "white" }
    ];
    const player = { x: 430, y: 500, w: 60, h: 20, speed: 420 };

    const save = () => localStorage.setItem('doger1SaveArcade', JSON.stringify({level, coins, currentSkin, ownedSkins}));
    const load = () => {
      const raw = localStorage.getItem('doger1SaveArcade');
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        level = data.level ?? 1;
        coins = data.coins ?? 0;
        currentSkin = data.currentSkin ?? 'white';
        ownedSkins = data.ownedSkins ?? {white:true};
        ownedSkins.white = true;
      } catch {}
    };

    function renderShop() {
      gameUI.innerHTML = '';
      const info = helpers.section('Shop');
      skinList.forEach(skin => {
        const b = helpers.button(
          ownedSkins[skin.name]
            ? (currentSkin===skin.name ? `${skin.name} [using]` : `${skin.name} (owned)`)
            : `${skin.name} (${skin.cost})`,
          () => {
            if (ownedSkins[skin.name]) {
              currentSkin = skin.name;
            } else if (coins >= skin.cost) {
              coins -= skin.cost;
              ownedSkins[skin.name] = true;
              currentSkin = skin.name;
            }
            save();
            renderShop();
          },
          {kind:'secondary'}
        );
        b.style.background = skin.color;
        b.style.color = skin.text;
        info.appendChild(b);
      });
      const actions = helpers.section('Actions');
      actions.appendChild(helpers.button('Retry', ()=>restartLoss(), {kind:'secondary'}));
      actions.appendChild(helpers.button('Next Level', ()=>nextLevel(), {kind:'good'}));
      gameUI.appendChild(info);
      gameUI.appendChild(actions);
    }

    function restartLoss() {
      obstacles = [];
      score = 0;
      frameCount = 0;
      gameOver = false;
      levelComplete = false;
      player.x = 430;
    }

    function nextLevel() {
      if (!levelComplete) return;
      level++;
      obstacles = [];
      score = 0;
      frameCount = 0;
      gameOver = false;
      levelComplete = false;
      player.x = 430;
      save();
      renderShop();
    }

    return {
      name:'Block Dodger',
      instructions:'Move left/right or use your mouse. R retries. N goes to next level.',
      init() {
        level = 1; score = 0; coins = 0; currentSkin = 'white'; ownedSkins = {white:true};
        obstacles = []; gameOver = false; levelComplete = false; frameCount = 0; mouseActive = false;
        load();
        restartLoss();
        renderShop();
      },
      keydown(e) {
        const k = e.key.toLowerCase();
        if (k==='r' && gameOver) restartLoss();
        if (k==='n' && levelComplete) nextLevel();
      },
      mousemove(x) {
        mouse.x = x;
        mouseActive = true;
      },
      update(dt) {
        if (gameOver || levelComplete) return;
        frameCount++;
        if (keys['arrowleft'] || keys['a']) player.x -= player.speed * dt;
        if (keys['arrowright'] || keys['d']) player.x += player.speed * dt;
        if (mouseActive) {
          const target = mouse.x - player.w / 2;
          const diff = target - player.x;
          const step = Math.sign(diff) * Math.min(Math.abs(diff), player.speed * dt);
          player.x += step;
        }
        player.x = helpers.clamp(player.x, 0, canvas.width - player.w);

        const spawnRate = Math.max(14, 34 - level * 2);
        if (frameCount % spawnRate === 0) {
          const w = helpers.rand(24, 90);
          obstacles.push({
            x: helpers.rand(0, canvas.width - w),
            y: -25,
            w, h: 20,
            vy: helpers.rand(160, 290) + level * 18
          });
        }

        for (let i=obstacles.length-1;i>=0;i--) {
          const o = obstacles[i];
          o.y += o.vy * dt;
          if (helpers.rects(player, o)) {
            gameOver = true;
            coins += score;
            save();
            renderShop();
            return;
          }
          if (o.y > canvas.height) {
            obstacles.splice(i,1);
            score++;
            if (score >= levelGoal) {
              levelComplete = true;
              coins += 200;
              save();
              renderShop();
              return;
            }
          }
        }
      },
      draw() {
        helpers.clear('#222');
        ctx.fillStyle = 'white';
        ctx.font = '24px Arial';
        ctx.fillText(`Level: ${level}`, 20, 30);
        ctx.fillText(`Score: ${score} / ${levelGoal}`, 20, 60);
        ctx.fillText(`Coins: ${coins}`, 20, 90);
        ctx.fillText(`Skin: ${currentSkin}`, 20, 120);

        ctx.fillStyle = currentSkin;
        ctx.fillRect(player.x, player.y, player.w, player.h);

        ctx.fillStyle = 'tomato';
        obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

        if (gameOver) helpers.centerMessage('Game Over', 'Press R to retry');
        if (levelComplete) helpers.centerMessage('Level Complete!', 'Press N for next level');
      }
    };
  }

  function createSimon() {
    let sequence, player, flashIndex, flashTimer, accepting, colors, pads, round, over;
    function nextRound() {
      sequence.push(helpers.randi(0,3));
      player = [];
      flashIndex = 0;
      flashTimer = 0.5;
      accepting = false;
      round = sequence.length;
    }
    return {
      name:'Simon Memory Game',
      instructions:'Watch the pattern, then click the colors in the same order.',
      init() {
        colors = ['#ff4d4d','#4da6ff','#ffd24d','#4dff88'];
        pads = [
          {x:250,y:110,w:170,h:170,c:0},
          {x:480,y:110,w:170,h:170,c:1},
          {x:250,y:310,w:170,h:170,c:2},
          {x:480,y:310,w:170,h:170,c:3}
        ];
        sequence = [];
        player = [];
        flashIndex = 0;
        flashTimer = 0;
        accepting = false;
        over = false;
        round = 0;
        nextRound();
        const sec = helpers.section('Game');
        sec.appendChild(helpers.button('Restart', ()=>this.init(), {kind:'secondary'}));
        gameUI.appendChild(sec);
      },
      click(x,y) {
        if (!accepting || over) return;
        const pad = pads.find(p => x>=p.x && x<=p.x+p.w && y>=p.y && y<=p.y+p.h);
        if (!pad) return;
        player.push(pad.c);
        const idx = player.length - 1;
        if (player[idx] !== sequence[idx]) {
          over = true;
          accepting = false;
          return;
        }
        if (player.length === sequence.length) {
          setTimeout(() => nextRound(), 500);
        }
      },
      update(dt) {
        if (accepting || over) return;
        flashTimer -= dt;
        if (flashTimer <= 0) {
          flashIndex++;
          if (flashIndex > sequence.length * 2) {
            accepting = true;
          } else {
            flashTimer = 0.45;
          }
        }
      },
      draw() {
        helpers.clear('#111');
        const active = !accepting && flashIndex > 0 && flashIndex <= sequence.length*2 && flashIndex % 2 === 1
          ? sequence[(flashIndex-1)/2]
          : -1;
        pads.forEach((p,i)=>{
          ctx.fillStyle = i===active ? colors[i] : colors[i] + 'aa';
          ctx.fillRect(p.x,p.y,p.w,p.h);
        });
        helpers.drawText(`Round: ${round}`, 20, 32, 28);
        helpers.drawText(accepting ? 'Your turn' : 'Watch the pattern', 20, 62, 22);
        if (over) helpers.centerMessage('Wrong Pattern', 'Restart to try again');
      }
    };
  }

  function createTreasure() {
    let grid, revealed, treasure, moves, found;
    const size = 8, cell = 55, ox = 230, oy = 70;
    return {
      name:'Digging for Treasure',
      instructions:'Click squares to dig. Find the hidden treasure.',
      init() {
        grid = Array.from({length:size}, ()=>Array(size).fill(0));
        revealed = Array.from({length:size}, ()=>Array(size).fill(false));
        treasure = {x:helpers.randi(0,size-1), y:helpers.randi(0,size-1)};
        moves = 20;
        found = false;
        const sec = helpers.section('Game');
        sec.appendChild(helpers.button('New Map', ()=>this.init(), {kind:'secondary'}));
        gameUI.appendChild(sec);
      },
      click(x,y) {
        if (found || moves <= 0) return;
        const gx = Math.floor((x - ox) / cell);
        const gy = Math.floor((y - oy) / cell);
        if (gx < 0 || gy < 0 || gx >= size || gy >= size) return;
        if (revealed[gy][gx]) return;
        revealed[gy][gx] = true;
        moves--;
        if (gx === treasure.x && gy === treasure.y) found = true;
        else grid[gy][gx] = Math.abs(gx - treasure.x) + Math.abs(gy - treasure.y);
      },
      draw() {
        helpers.clear('#c2a46a');
        for (let y=0;y<size;y++) for (let x=0;x<size;x++) {
          ctx.fillStyle = revealed[y][x] ? '#9b7d4b' : '#7a5f35';
          ctx.fillRect(ox+x*cell, oy+y*cell, cell-2, cell-2);
          if (revealed[y][x]) {
            if (x===treasure.x && y===treasure.y) {
              helpers.drawText('💰', ox+x*cell+15, oy+y*cell+38, 28);
            } else if (grid[y][x] > 0) {
              helpers.drawText(String(grid[y][x]), ox+x*cell+22, oy+y*cell+35, 22, 'white');
            }
          }
        }
        helpers.drawText(`Moves Left: ${moves}`, 20, 32, 28);
        if (found) helpers.centerMessage('Treasure Found!');
        else if (moves <= 0) helpers.centerMessage('Out of Moves');
      }
    };
  }

      keydown(e) {

          bolts.push({x:player.x+player.w/2-4,y:player.y,w:8,h:18,vy:-420});
          cooldown = 0.28;
        }

        if (keys['arrowright'] || keys['d']) player.x += 320*dt;
        if (keys['arrowup'] || keys['w']) player.y -= 320*dt;

        player.x = helpers.clamp(player.x, 0, 900-player.w);

        spawn += dt;

          spawn = 0;
          enemies.push({x:helpers.rand(40,840),y:-30,w:34,h:34,hp:2,vy:helpers.rand(40,90),fire:helpers.rand(0.5,1.5)});
        }

        bolts.forEach(b=>b.y += b.vy*dt);
        ebolts.forEach(b=>b.y += b.vy*dt);
        enemies.forEach(en=>{
          en.y += en.vy*dt;
          en.fire -= dt;
          if (en.fire <= 0) {
            en.fire = helpers.rand(1.0,2.0);
            ebolts.push({x:en.x+en.w/2-4,y:en.y+en.h,w:8,h:16,vy:220});

          for (const en of enemies) {
            if (helpers.rects(b,en) && en.hp > 0) {
              en.hp--;
              b.y = -100;
              if (en.hp <= 0) score += 25;
            }
          }
        }

        for (const b of ebolts) {
          if (helpers.rects(b,player)) {
            b.y = 700;
            player.hp--;
            if (player.hp <= 0) over = true;
          }
        }

        for (const en of enemies) {
          if (helpers.rects(en,player)) {
            en.hp = 0;
            player.hp--;
            if (player.hp <= 0) over = true;
          }
        }

    let player, ghosts, shots, score, spawn, cooldown, over;
    return {
      name:'Ghost Hunter Game',
      instructions:'Move with arrows. Space shoots ghost traps.',
      init() {
        player = {x:430,y:500,w:32,h:42,hp:3};
        ghosts = [];
        shots = [];
        score = 0;
        spawn = 0;
        cooldown = 0;
        over = false;
        const sec = helpers.section('Game');
        sec.appendChild(helpers.button('Restart', ()=>this.init(), {kind:'secondary'}));
        gameUI.appendChild(sec);
      },
      keydown(e) {
        if (e.key === ' ' && cooldown <= 0 && !over) {
          shots.push({x:player.x+player.w/2-4,y:player.y,w:8,h:18,vy:-420});
          cooldown = 0.22;
        }
      },
      update(dt) {
        if (over) return;
        cooldown -= dt;
        if (keys['arrowleft'] || keys['a']) player.x -= 300*dt;
        if (keys['arrowright'] || keys['d']) player.x += 300*dt;
        if (keys['arrowup'] || keys['w']) player.y -= 300*dt;
        if (keys['arrowdown'] || keys['s']) player.y += 300*dt;
        player.x = helpers.clamp(player.x,0,900-player.w);
        player.y = helpers.clamp(player.y,60,560-player.h);

        spawn += dt;
        if (spawn > 0.8) {
          spawn = 0;
          ghosts.push({x:helpers.rand(20,860),y:-20,r:18,vy:helpers.rand(70,130),vx:helpers.rand(-80,80)});
        }

        shots.forEach(s=>s.y += s.vy*dt);
        shots = shots.filter(s=>s.y > -30);

        ghosts.forEach(g=>{
          g.y += g.vy*dt;
          g.x += g.vx*dt;
          if (g.x < 10 || g.x > 890) g.vx *= -1;
        });
        ghosts = ghosts.filter(g=>g.y < 620);

        for (const s of shots) {
          for (const g of ghosts) {
            if (helpers.dist(s.x+4,s.y+9,g.x,g.y) < g.r+8) {
              g.y = 700;
              s.y = -100;
              score += 10;
            }
          }
        }

        ghosts = ghosts.filter(g=>g.y < 620);

        for (const g of ghosts) {
          if (helpers.circleRect(g.x,g.y,g.r,player)) {
            g.y = 700;
            player.hp--;
            if (player.hp <= 0) over = true;
          }
        }
        ghosts = ghosts.filter(g=>g.y < 620);
      },
      draw() {
        helpers.clear('#0f0f1d');
        ctx.fillStyle='#d9d9ff';
        ghosts.forEach(g=>{
          ctx.beginPath(); ctx.arc(g.x,g.y,g.r,Math.PI,0); ctx.fill();
          ctx.fillRect(g.x-g.r,g.y,g.r*2,g.r);
        });
        ctx.fillStyle='#6be3ff';
        ctx.fillRect(player.x,player.y,player.w,player.h);
        ctx.fillStyle='yellow';
        shots.forEach(s=>ctx.fillRect(s.x,s.y,s.w,s.h));
        helpers.drawText(`Score: ${score}`,20,32,28);
        helpers.drawText(`HP: ${player.hp}`,20,62,22);
        if (over) helpers.centerMessage('Ghosts Win');
      }
    };
  }

  function createRobotBuilder() {
    let parts, built;
    return {
      name:'Giant Robot Builder',
      instructions:'Click the parts in the right panel to build your robot.',
      init() {
        parts = {head:false,body:false,leftArm:false,rightArm:false,leftLeg:false,rightLeg:false};
        built = 0;
        const sec = helpers.section('Parts');
        Object.keys(parts).forEach(name=>{
          sec.appendChild(helpers.button(name, ()=>{
            if (!parts[name]) { parts[name] = true; built++; }
          }, {kind:'secondary'}));
        });
        sec.appendChild(helpers.button('Restart', ()=>this.init(), {kind:'good'}));
        gameUI.appendChild(sec);
      },
      draw() {
        helpers.clear('#182030');
        helpers.drawText(`Built Parts: ${built}/6`,20,32,28);
        ctx.strokeStyle='white';
        ctx.lineWidth=4;
        const cx = 430, cy = 170;
        if (parts.head) ctx.strokeRect(cx,cy,80,70);
        if (parts.body) ctx.strokeRect(cx-10,cy+80,100,120);
        if (parts.leftArm) ctx.strokeRect(cx-70,cy+85,50,20);
        if (parts.rightArm) ctx.strokeRect(cx+100,cy+85,50,20);
        if (parts.leftLeg) ctx.strokeRect(cx+5,cy+205,20,90);
        if (parts.rightLeg) ctx.strokeRect(cx+55,cy+205,20,90);
        if (built === 6) helpers.centerMessage('Robot Complete!');
      }
    };
  }

  function createSlime() {
    let slime, food, level;
    function newFood() {
      return {x:helpers.rand(30,870), y:helpers.rand(40,530), r:10};
    }
    return {
      name:'Slime Evolution Game',
      instructions:'Move around and eat food to evolve.',
      init() {
        slime = {x:450,y:280,r:18};
        food = Array.from({length:12}, ()=>newFood());
        level = 1;
      },
      update(dt) {
        const sp = 170;
        if (keys['arrowleft'] || keys['a']) slime.x -= sp*dt;
        if (keys['arrowright'] || keys['d']) slime.x += sp*dt;
        if (keys['arrowup'] || keys['w']) slime.y -= sp*dt;
        if (keys['arrowdown'] || keys['s']) slime.y += sp*dt;
        slime.x = helpers.clamp(slime.x, slime.r, 900-slime.r);
        slime.y = helpers.clamp(slime.y, slime.r, 560-slime.r);

        for (const f of food) {
          if (f.alive !== false && helpers.dist(slime.x,slime.y,f.x,f.y) < slime.r + f.r) {
            f.alive = false;
            slime.r += 1.5;
          }
        }

        if (food.every(f=>f.alive === false)) {
          food = Array.from({length:12}, ()=>newFood());
          level++;
        }
      },
      draw() {
        helpers.clear('#14331f');
        ctx.fillStyle='gold';
        food.forEach(f=>{
          if (f.alive === false) return;
          ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.fill();
        });
        ctx.fillStyle='#6bff8f';
        ctx.beginPath(); ctx.arc(slime.x,slime.y,slime.r,0,Math.PI*2); ctx.fill();
        helpers.drawText(`Level: ${level}`,20,32,28);
        helpers.drawText(`Size: ${slime.r.toFixed(0)}`,20,62,22);
      }
    };
  }

  function createVolcanoBuilder() {
    let lava, huts, bridges;
    return {
      name:'Volcano Island Builder',
      instructions:'Place huts and bridges before the lava rises too high.',
      init() {
        lava = 0;
        huts = [];
        bridges = [];
        const sec = helpers.section('Build');
        sec.appendChild(helpers.button('Add Hut', ()=>{
          huts.push({x:helpers.rand(120,780), y:helpers.rand(330,500)});
        }, {kind:'secondary'}));
        sec.appendChild(helpers.button('Add Bridge', ()=>{
          bridges.push({x:helpers.rand(150,720), y:helpers.rand(250,420), w:helpers.rand(90,160)});
        }, {kind:'good'}));
        sec.appendChild(helpers.button('Restart', ()=>this.init(), {kind:'secondary'}));
        gameUI.appendChild(sec);
      },
      update(dt) {
        lava += dt * 10;
      },
      draw() {
        helpers.clear('#302010');
        ctx.fillStyle='#3f7a3f';
        ctx.beginPath(); ctx.arc(450,360,240,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#5a3a20';
        ctx.beginPath(); ctx.moveTo(360,330); ctx.lineTo(450,120); ctx.lineTo(540,330); ctx.closePath(); ctx.fill();
        ctx.fillStyle='orange';
        ctx.fillRect(405, 120 + lava, 90, 210 - lava);
        bridges.forEach(b=>{
          ctx.fillStyle='#7a4a22';
          ctx.fillRect(b.x,b.y,b.w,12);
        });
        huts.forEach(h=>{
          ctx.fillStyle='#c97c4a';
          ctx.fillRect(h.x,h.y,34,24);
          ctx.fillStyle='#7b3f00';
          ctx.fillRect(h.x-2,h.y-10,38,12);
        });
        helpers.drawText(`Lava Height: ${Math.floor(lava)}`,20,32,28);
      }
    };
  }

  function createDinoPark() {
    let money, dinos, visitors;
    return {
      name:'Dinosaur Park Game',
      instructions:'Buy dinosaurs to attract visitors and earn money.',
      init() {
        money = 50;
        dinos = 0;
        visitors = 0;
        const sec = helpers.section('Park');
        sec.appendChild(helpers.button('Buy Dino (25)', ()=>{
          if (money >= 25) { money -= 25; dinos++; }
        }, {kind:'good'}));
        sec.appendChild(helpers.button('Restart', ()=>this.init(), {kind:'secondary'}));
        gameUI.appendChild(sec);
      },
      update(dt) {
        visitors += dinos * dt * 0.6;
        money += dinos * dt * 1.1;
      },
      draw() {
        helpers.clear('#a7d97a');
        for (let i=0;i<dinos;i++) {
          const x = 170 + (i%6)*100;
          const y = 180 + Math.floor(i/6)*90;
          ctx.fillStyle='green';
          ctx.fillRect(x,y,50,30);
          ctx.fillRect(x+35,y-20,14,24);
          ctx.fillRect(x+42,y-30,16,14);
        }
        helpers.drawText(`Money: ${Math.floor(money)}`,20,32,28,'black');
        helpers.drawText(`Dinosaurs: ${dinos}`,20,62,22,'black');
        helpers.drawText(`Visitors: ${Math.floor(visitors)}`,20,90,22,'black');
      }
    };
  }
  function createMarsRover() {
    let rover, rocks, samples, collected, timeLeft, over, won;
    return {
      name:'Mars Rover Mission',
      instructions:'Drive around Mars and collect all the samples before time runs out.',
      init() {
        rover = {x:80,y:500,w:44,h:26};
        rocks = Array.from({length:18}, ()=>({
          x:helpers.rand(80,860), y:helpers.rand(70,510), r:helpers.rand(10,18)
        }));
        samples = Array.from({length:8}, ()=>({
          x:helpers.rand(90,850), y:helpers.rand(80,500), r:10, alive:true
        }));
        collected = 0;
        timeLeft = 60;
        over = false;
        won = false;
        const sec = helpers.section('Mission');
        sec.appendChild(helpers.button('Restart', ()=>this.init(), {kind:'secondary'}));
        gameUI.appendChild(sec);
      },
      update(dt) {
        if (over || won) return;
        timeLeft -= dt;
        if (timeLeft <= 0) { over = true; return; }

        const oldX = rover.x;
        const oldY = rover.y;
        const sp = 180;
        if (keys['arrowleft'] || keys['a']) rover.x -= sp*dt;
        if (keys['arrowright'] || keys['d']) rover.x += sp*dt;
        if (keys['arrowup'] || keys['w']) rover.y -= sp*dt;
        if (keys['arrowdown'] || keys['s']) rover.y += sp*dt;
        rover.x = helpers.clamp(rover.x, 0, 900-rover.w);
        rover.y = helpers.clamp(rover.y, 0, 560-rover.h);

        for (const r of rocks) {
          if (helpers.circleRect(r.x,r.y,r.r,rover)) {
            rover.x = oldX;
            rover.y = oldY;
            break;
          }
        }

        for (const s of samples) {
          if (s.alive && helpers.dist(rover.x+rover.w/2, rover.y+rover.h/2, s.x, s.y) < s.r + 18) {
            s.alive = false;
            collected++;
          }
        }

        if (samples.every(s=>!s.alive)) won = true;
      },
      draw() {
        helpers.clear('#8b4f2c');
        ctx.fillStyle='#6a3a1a';
        rocks.forEach(r=>{
          ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2); ctx.fill();
        });
        ctx.fillStyle='cyan';
        samples.forEach(s=>{
          if (!s.alive) return;
          ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
        });
        ctx.fillStyle='#ddd';
        ctx.fillRect(rover.x,rover.y,rover.w,rover.h);
        ctx.fillStyle='#999';
        ctx.fillRect(rover.x+6,rover.y-10,24,10);
        helpers.drawText(`Samples: ${collected}/8`,20,32,28);
        helpers.drawText(`Time: ${Math.ceil(timeLeft)}`,20,62,22);
        if (won) helpers.centerMessage('Mission Complete!');
        if (over) helpers.centerMessage('Mission Failed');
      }
    };
  }

  function createBlackHole() {
    let ship, stars, score, over;
    const hole = {x:450,y:280,r:70};
    return {
      name:'Black Hole Escape',
      instructions:'Stay away from the black hole and survive as long as you can.',
      init() {
        ship = {x:150,y:100,w:28,h:28,vx:0,vy:0};
        stars = Array.from({length:100},()=>({x:helpers.rand(0,900),y:helpers.rand(0,560),s:helpers.rand(1,3)}));
        score = 0;
        over = false;
        const sec = helpers.section('Game');
        sec.appendChild(helpers.button('Restart', ()=>this.init(), {kind:'secondary'}));
        gameUI.appendChild(sec);
      },
      update(dt) {
        if (over) return;
        const ax = hole.x - (ship.x+ship.w/2);
        const ay = hole.y - (ship.y+ship.h/2);
        const d = Math.max(60, Math.hypot(ax,ay));
        const force = 9000 / (d*d);
        ship.vx += (ax/d) * force * dt * 200;
        ship.vy += (ay/d) * force * dt * 200;

        if (keys['arrowleft'] || keys['a']) ship.vx -= 180*dt;
        if (keys['arrowright'] || keys['d']) ship.vx += 180*dt;
        if (keys['arrowup'] || keys['w']) ship.vy -= 180*dt;
        if (keys['arrowdown'] || keys['s']) ship.vy += 180*dt;

        ship.x += ship.vx * dt;
        ship.y += ship.vy * dt;
        ship.vx *= 0.992;
        ship.vy *= 0.992;

        if (helpers.dist(ship.x+14,ship.y+14,hole.x,hole.y) < hole.r + 10) over = true;
        if (ship.x < -50 || ship.x > 950 || ship.y < -50 || ship.y > 610) over = true;

        if (!over) score += dt * 10;
      },
      draw() {
        helpers.clear('black');
        ctx.fillStyle='white';
        stars.forEach(s=>ctx.fillRect(s.x,s.y,s.s,s.s));
        const grad = ctx.createRadialGradient(hole.x,hole.y,10,hole.x,hole.y,120);
        grad.addColorStop(0,'#000');
        grad.addColorStop(0.5,'#320049');
        grad.addColorStop(1,'rgba(128,0,255,0.1)');
        ctx.fillStyle=grad;
        ctx.beginPath(); ctx.arc(hole.x,hole.y,120,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#111';
        ctx.beginPath(); ctx.arc(hole.x,hole.y,hole.r,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#4da6ff';
        ctx.fillRect(ship.x,ship.y,ship.w,ship.h);
        helpers.drawText(`Score: ${Math.floor(score)}`,20,32,28);
        if (over) helpers.centerMessage('Pulled In');
      }
    };
  }

  function createPlaceholderArcade(name, instruction, color='#222') {
    let score = 0, timer = 0;
    return {
      name,
      instructions: instruction,
      init() {
        score = 0;
        timer = 0;
        const sec = helpers.section('Game');
        sec.appendChild(helpers.button('Restart', ()=>this.init(), {kind:'secondary'}));
        gameUI.appendChild(sec);
      },
      update(dt) {
        timer += dt;
        score = Math.floor(timer * 10);
      },
      draw() {
        helpers.clear(color);
        helpers.drawText(name, 450, 220, 44, 'white', 'center');
        helpers.drawText('This is a simple arcade version built into the file.', 450, 270, 24, '#ddd', 'center');
        helpers.drawText(`Score: ${score}`, 450, 320, 28, 'white', 'center');
      }
    };
  }

  const registry = [
    ['snake', createSnake()],
    ['flappy', createFlappy()],
    ['shooter', createShooter()],
    ['cookie', createCookie()],
    ['doger', createDoger()],
    ['frogger', createFrogger()],
    ['breakout', createBreakout()],
    ['pong', createPong()],
    ['simon', createSimon()],
    ['reaction', createReaction()],
    ['angry', createAngry()],
    ['basketball', createBasketball()],
    ['treasure', createTreasure()],
    ['trivia', createTrivia()],
    ['city', createCity()],
    ['ufo', createUFO()],
    ['spell', createSpellBattle()],
    ['monster', createMonster()],
    ['island', createIsland()],
    ['colony', createColony()],
    ['meteor', createMeteorDodger()],
    ['rocket', createRocketLanding()],
    ['jetpack', createJetpack()],
    ['ghost', createGhostHunter()],
    ['robot', createRobotBuilder()],
    ['slime', createSlime()],
    ['volcano', createVolcanoBuilder()],
    ['dino', createDinoPark()],
    ['mars', createMarsRover()],
    ['blackhole', createBlackHole()]
  ];

  const gameCards = [
    { id:'snake', title:'Snake', tag:'Playable' },
    { id:'flappy', title:'Flappy Bird', tag:'Playable' },
    { id:'shooter', title:'Space Shooter', tag:'Playable' },
    { id:'cookie', title:'Cookie Clicker', tag:'Playable' },
    { id:'doger', title:'Block Dodger', tag:'Playable' },
    { id:'frogger', title:'Frogger', tag:'Playable' },
    { id:'breakout', title:'Breakout', tag:'Playable' },
    { id:'pong', title:'Pong', tag:'Playable' },
    { id:'simon', title:'Simon Memory Game', tag:'Playable' },
    { id:'reaction', title:'Reaction Speed Test', tag:'Playable' },
    { id:'angry', title:'Angry Birds Launcher', tag:'Playable' },
    { id:'basketball', title:'Basketball Shot Game', tag:'Playable' },
    { id:'treasure', title:'Digging for Treasure', tag:'Playable' },
    { id:'trivia', title:'Trivia Quiz Game', tag:'Playable' },
    { id:'city', title:'Build-a-City', tag:'Playable' },
    { id:'ufo', title:'UFO Catcher Game', tag:'Playable' },
    { id:'spell', title:'Magic Spell Battle', tag:'Playable' },
    { id:'monster', title:'Giant Monster Destroyer', tag:'Playable' },
    { id:'island', title:'Island Survival', tag:'Playable' },
    { id:'colony', title:'Planet Colony Builder', tag:'Playable' },
    { id:'meteor', title:'Meteor Dodger', tag:'Playable' },
    { id:'rocket', title:'Rocket Landing Game', tag:'Playable' },
    { id:'jetpack', title:'Jetpack Cave Escape', tag:'Playable' },
    { id:'ghost', title:'Ghost Hunter Game', tag:'Playable' },
    { id:'robot', title:'Giant Robot Builder', tag:'Playable' },
    { id:'slime', title:'Slime Evolution Game', tag:'Playable' },
    { id:'volcano', title:'Volcano Island Builder', tag:'Playable' },
    { id:'dino', title:'Dinosaur Park Game', tag:'Playable' },
    { id:'mars', title:'Mars Rover Mission', tag:'Playable' },
    { id:'blackhole', title:'Black Hole Escape', tag:'Playable' }
  ];

  const map = new Map(registry);

  gameCards.forEach(card => {
    const el = document.createElement('button');
    el.className = 'game-card';
    el.innerHTML = `<h3>${card.title}</h3><span class="tag">${card.tag}</span>`;
    el.onclick = () => setGame(card.id, map.get(card.id));
    gamesList.appendChild(el);
  });
})();
</script>
